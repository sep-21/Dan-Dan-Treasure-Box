name: Windows Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run build

      - name: Build Windows packages
        run: npx electron-builder@26.0.12 --win nsis portable

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FrameForge-Windows
          path: release/*
